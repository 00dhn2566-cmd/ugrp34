<svg xmlns="http://www.w3.org/2000/svg" width="680" height="650" viewBox="0 0 680 650" font-family="'Noto Sans KR','Noto Sans CJK KR','Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
<title>UGRP 전체 파이프라인과 담당자</title>
<desc>Isaac Sim 센서에서 시작해 창문 탐지(류길남), 상태추정·융합(박태민), 경로계획(담당 미정), PID 제어(박성진)를 거쳐 드론 물리로 돌아오는 폐루프 런타임 파이프라인과, 조윤호의 데이터셋 생성·RL 훈련 환경이 각 블록을 지원하는 오프라인 흐름.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="680" height="650" fill="#ffffff"/>

<rect x="70" y="40" width="260" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="200" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">카메라 · IMU 센서</text>
<text x="200" y="76" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Isaac Sim 출력 (조윤호)</text>

<line x1="200" y1="96" x2="200" y2="136" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M100 96 L100 112 L48 112 L48 268 L64 268" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="70" y="140" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="200" y="158" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">창문 탐지 (비전)</text>
<text x="200" y="176" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">류길남 · 2D corner + 순서</text>

<line x1="200" y1="196" x2="200" y2="236" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="210" y="220" font-size="12" fill="#5F5E5A">§5 (v0.2 확정)</text>

<rect x="70" y="240" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="200" y="258" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">상태추정 · 융합 (VIO)</text>
<text x="200" y="276" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">박태민 · pose + 창문 3D</text>

<line x1="200" y1="296" x2="200" y2="336" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="210" y="312" font-size="12" fill="#5F5E5A">드론 상태 + 창문 3D 맵</text>
<text x="210" y="328" font-size="12" fill="#5F5E5A">v0.1 후보안 · 오늘 확정</text>

<rect x="70" y="340" width="260" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="200" y="358" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">경로계획 (RL 정책)</text>
<text x="200" y="376" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">담당 미정 — 오늘 안건</text>

<line x1="200" y1="396" x2="200" y2="436" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="210" y="420" font-size="12" fill="#5F5E5A">웨이포인트 · 참조 궤적</text>

<rect x="70" y="440" width="260" height="56" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="200" y="458" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#72243E">저수준 제어 (PID)</text>
<text x="200" y="476" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993556">박성진 · 재설계 예정</text>

<line x1="200" y1="496" x2="200" y2="536" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="210" y="520" font-size="12" fill="#5F5E5A">추력 · 토크</text>

<rect x="70" y="540" width="260" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="200" y="558" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">드론 · 시뮬 물리</text>
<text x="200" y="576" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">→ 센서로 복귀 (폐루프)</text>

<rect x="405" y="105" width="235" height="310" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
<text x="421" y="130" font-size="14" font-weight="500" fill="#3d3d3a">조윤호 — 오프라인 지원</text>

<rect x="420" y="145" width="205" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="522" y="163" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">데이터셋 자동 생성</text>
<text x="522" y="181" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Replicator · 3,000장~</text>

<path d="M420 170 L336 170" fill="none" stroke="#73726c" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text x="378" y="158" text-anchor="middle" font-size="12" fill="#5F5E5A">모델 학습</text>

<rect x="420" y="330" width="205" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="522" y="348" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">RL 훈련 환경</text>
<text x="522" y="366" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">환경 병렬화 · 로깅</text>

<path d="M420 358 L336 358" fill="none" stroke="#73726c" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text x="378" y="346" text-anchor="middle" font-size="12" fill="#5F5E5A">정책 훈련</text>

<text x="70" y="628" font-size="12" fill="#5F5E5A">※ 파이프라인 전반 설계·감독 — 류길남 · 실선 = 런타임, 점선 = 오프라인</text>
</svg>
