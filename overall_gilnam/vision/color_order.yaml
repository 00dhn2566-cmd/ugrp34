# color_order.yaml — 색↔통과순서 매핑 + HSV 판정 구간
# 이 파일이 "코드가 읽는 실행 기준"이다 (하드코딩 금지 — 체크리스트 §2).
# 값의 원본은 window_detection_spec_v0.2 §3.1 테이블 — 변경 시 두 곳을 함께 갱신할 것.
# H는 OpenCV 기준 0~179, S·V는 0~255.
# 색 추가 절차: colors에 항목 1개 추가 + spec §3.1 갱신 (코드·모델 수정 없음 — §3 확장성 원칙)

# 공통 최소 임계 (모든 색에 적용)
hsv_min_s: 100
hsv_min_v: 80

colors:
  red:
    order_index: 0
    h_ranges: [[0, 10], [170, 179]]   # 빨강은 hue 원형 경계라 구간 2개
  green:
    order_index: 1
    h_ranges: [[50, 70]]
  blue:
    order_index: 2
    h_ranges: [[110, 130]]

# ---- 판정 방식 파라미터 (color_conf 산출용) ----
# 초기 가안 — 시뮬 렌더 색 확인 후 미세조정 (spec §7 잔여 사항)
sampling:
  # 샘플 영역: bbox 내부가 아니라 corner 사각형의 "테두리 밴드".
  # 창문은 개구부라 내부에는 배경이 비쳐 보이므로 프레임(테두리) 픽셀만 유효.
  region: corner_polygon_edge_band
  band_px: 6              # 테두리에서 안쪽으로 샘플링할 밴드 폭 (720p 픽셀 기준)
  min_inlier_ratio: 0.5   # 밴드 픽셀 중 판정 구간 통과 비율이 이 값 미만이면 색=unknown

# color_conf 정의(제안): 최다 득표 색의 inlier 비율 (0~1) — 구현 시 확정, §5의 color_conf로 그대로 출력
