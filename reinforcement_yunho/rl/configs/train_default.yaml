# Training hyperparameters + env config for rl.train (spec 7.3).
#
# Reward weights and DR ranges live in SEPARATE files (spec 7.2 / 7.1) and are
# referenced by path so they can be swapped without touching this file.
# Loaded by rl.train (which reads the top-level keys) and rl.window_env.EnvConfig
# (which reads the `env:` block).

# --- run identity / reproducibility (CONVENTIONS "Reproducibility") ---
seed: 0
algo: PPO                    # used only if stable-baselines3 is importable
num_envs: 4                 # vectorised MockPhysics (or Isaac) envs
total_timesteps: 1000000
checkpoint_every: 50000     # env steps between checkpoints
log_dir: runs               # run_<config>_<seed>_<hash>/ is created under here

# --- external config references ---
reward_config: rl/configs/reward_default.yaml
dr_config: rl/configs/domain_randomization_default.yaml

# --- curriculum (spec 7.3): staged difficulty; consumed by train.py when enabled ---
curriculum:
  enabled: false
  stages:
    # each stage overrides a few env fields until `until_timesteps` is reached
    - name: single_window_no_dr
      until_timesteps: 200000
      env: {num_windows_min: 1, num_windows_max: 1, domain_randomization: false, window_yaw_deg: 0.0}
    - name: two_windows
      until_timesteps: 500000
      env: {num_windows_min: 1, num_windows_max: 2, domain_randomization: false, window_yaw_deg: 10.0}
    - name: full_dr
      until_timesteps: 1000000
      env: {num_windows_min: 1, num_windows_max: 3, domain_randomization: true, window_yaw_deg: 20.0}

# --- environment config (rl.window_env.EnvConfig) ---
env:
  dt: 0.05
  max_steps: 400
  waypoint_scale: 2.0        # m; normalised action [-1,1]^3 -> heading-frame displacement

  # low-level PID (modelled by the physics backend)
  kp: 4.0
  kd: 3.0
  accel_max: 12.0            # m/s^2 controller accel limit

  # nominal dynamics (DR overrides these per-episode when domain_randomization: true)
  mass: 1.0
  thrust_scale: 1.0
  drag_coef: 0.20

  # pass/collision geometry (window = opening in a wall of this half-extent)
  wall_half_extent: 3.0
  bounds_radius: 40.0

  # scene sampling (window geometry randomisation)
  num_windows_min: 1
  num_windows_max: 3
  window_spacing: [4.0, 6.0]
  window_lateral: 1.0
  base_height: 1.5
  window_yaw_deg: 20.0       # spec 4.1 allows up to +/-60; start modest
  window_width: [1.0, 1.6]
  window_height: [1.0, 1.6]
  start_back: 3.0

  # toggles
  domain_randomization: false   # per-episode dynamics/noise DR
  observation_noise: false      # spec 7.6 estimator noise; default OFF = clean (spec 7.1)
  obs_pos_noise_std: 0.05       # used only if observation_noise: true and DR off
  obs_vel_noise_std: 0.05
  obs_att_noise_std: 0.01
